name: Activity Index Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '40 16 * * *'
    - cron: '40 4 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install activity index package
        run: python -m pip install -e ./tools/activity_index

      - name: Refresh activity indexes
        run: python -c "from activity_index.main import main; main()"

      - name: Commit updated resources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/*.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh remote activity indexes"
          git push
