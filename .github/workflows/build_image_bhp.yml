name: "BiliHelper-personal Docker Image Build"

on:
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: "docker镜像tag(多个tag用英文逗号分隔，如 latest,master,2.0.0)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare tags
        id: prep
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          sanitized_ref="${ref_name//\//-}"
          tags=()

          if [[ "${ref_name}" == "master" ]]; then
            tags+=("lkeme/bilihelper-personal:latest")
            tags+=("lkeme/bilihelper-personal:master")
          else
            tags+=("lkeme/bilihelper-personal:${sanitized_ref}")
          fi

          tags+=("lkeme/bilihelper-personal:${sanitized_ref}-${GITHUB_SHA::7}")

          if [[ -n "${{ github.event.inputs.docker_image_tag }}" ]]; then
            IFS=',' read -ra custom_tags <<< "${{ github.event.inputs.docker_image_tag }}"
            for tag in "${custom_tags[@]}"; do
              cleaned="$(echo "${tag}" | xargs)"
              if [[ -n "${cleaned}" ]]; then
                tags+=("lkeme/bilihelper-personal:${cleaned}")
              fi
            done
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}" | awk '!seen[$0]++'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            DEFAULT_BRANCH=${{ github.ref_name }}
